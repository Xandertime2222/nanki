name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.12'
  APP_NAME: Nanki
  APP_VERSION: '0.3.2'
  PUBLISHER: Nanki Project

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pyinstaller-hooks-contrib pywebview

      - name: Validate Windows icon
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/nanki-icon.ico")) {
            Write-Error "Missing Windows icon: assets/nanki-icon.ico"
            exit 1
          }

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean `
            --name "${{ env.APP_NAME }}" `
            --windowed `
            --noconsole `
            --icon "assets/nanki-icon.ico" `
            --paths src `
            --add-data "src/noteforge_anki_studio/static;noteforge_anki_studio/static" `
            --add-data "src/noteforge_anki_studio/templates;noteforge_anki_studio/templates" `
            --hidden-import noteforge_anki_studio `
            --hidden-import noteforge_anki_studio.ai `
            --hidden-import noteforge_anki_studio.anki_connect `
            --hidden-import noteforge_anki_studio.config `
            --hidden-import noteforge_anki_studio.coverage `
            --hidden-import noteforge_anki_studio.exporters `
            --hidden-import noteforge_anki_studio.importers `
            --hidden-import noteforge_anki_studio.models `
            --hidden-import noteforge_anki_studio.prompts `
            --hidden-import noteforge_anki_studio.storage `
            --hidden-import noteforge_anki_studio.app `
            --hidden-import webview `
            --hidden-import webview.platforms.winforms `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan.on `
            --collect-all uvicorn `
            --collect-all starlette `
            --collect-all fastapi `
            --collect-all mistune `
            --collect-all markdownify `
            --collect-all httpx `
            --collect-all pydantic `
            --collect-all jinja2 `
            --collect-all PyYAML `
            --collect-all clr `
            --collect-all System `
            --collect-all System.Windows.Forms `
            launcher_webview.py

      - name: Verify build
        shell: pwsh
        run: |
          $exePath = "dist/${{ env.APP_NAME }}/${{ env.APP_NAME }}.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "$exePath not found!"
            Get-ChildItem -Recurse dist | Select-Object FullName
            exit 1
          }

          Write-Host "Build verified: $exePath"

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Create installer
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/nanki-icon.ico")) {
            Write-Error "Missing icon: assets/nanki-icon.ico"
            exit 1
          }

          $nsisContent = @'
          !define PRODUCT_NAME "__APP_NAME__"
          !define PRODUCT_VERSION "__APP_VERSION__"
          !define PRODUCT_PUBLISHER "__PUBLISHER__"
          !define PRODUCT_ICON "assets\nanki-icon.ico"
          !define PRODUCT_EXE "__APP_NAME__.exe"

          !include "MUI2.nsh"

          Name "${PRODUCT_NAME}"
          OutFile "__APP_NAME__-Windows-Setup.exe"
          InstallDir "$PROGRAMFILES64\__APP_NAME__"
          InstallDirRegKey HKLM "Software\__APP_NAME__" "Install_Dir"
          RequestExecutionLevel admin

          !define MUI_ICON "${PRODUCT_ICON}"
          !define MUI_UNICON "${PRODUCT_ICON}"

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !define MUI_FINISHPAGE_RUN "$INSTDIR\__APP_NAME__.exe"
          !insertmacro MUI_PAGE_FINISH

          !insertmacro MUI_LANGUAGE "English"

          Function .onInit
            ReadRegStr $0 HKLM "Software\__APP_NAME__" "Install_Dir"
            StrCmp $0 "" done
            IfFileExists "$0\Uninstall.exe" 0 done
            ExecWait '"$0\Uninstall.exe" /S _?=$0'
            done:
          FunctionEnd

          Section "Install" SecInstall
            SetOutPath "$INSTDIR"
            File /r "dist\__APP_NAME__\*.*"

            CreateDirectory "$SMPROGRAMS\__APP_NAME__"
            CreateShortcut "$SMPROGRAMS\__APP_NAME__\__APP_NAME__.lnk" "$INSTDIR\__APP_NAME__.exe" "" "$INSTDIR\__APP_NAME__.exe" 0
            CreateShortcut "$DESKTOP\__APP_NAME__.lnk" "$INSTDIR\__APP_NAME__.exe" "" "$INSTDIR\__APP_NAME__.exe" 0

            WriteUninstaller "$INSTDIR\Uninstall.exe"
            WriteRegStr HKLM "Software\__APP_NAME__" "Install_Dir" "$INSTDIR"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\__APP_NAME__" "DisplayName" "__APP_NAME__"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\__APP_NAME__" "UninstallString" "$INSTDIR\Uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\__APP_NAME__" "DisplayIcon" "$INSTDIR\__APP_NAME__.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\__APP_NAME__" "Publisher" "__PUBLISHER__"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\__APP_NAME__" "DisplayVersion" "__APP_VERSION__"
          SectionEnd

          Section "Uninstall" SecUninstall
            RMDir /r "$INSTDIR"
            Delete "$DESKTOP\__APP_NAME__.lnk"
            Delete "$SMPROGRAMS\__APP_NAME__\__APP_NAME__.lnk"
            RMDir "$SMPROGRAMS\__APP_NAME__"
            DeleteRegKey HKLM "Software\__APP_NAME__"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\__APP_NAME__"
          SectionEnd
          '@

          $nsisContent = $nsisContent.Replace("__APP_NAME__", "${{ env.APP_NAME }}")
          $nsisContent = $nsisContent.Replace("__APP_VERSION__", "${{ env.APP_VERSION }}")
          $nsisContent = $nsisContent.Replace("__PUBLISHER__", "${{ env.PUBLISHER }}")

          Set-Content -Path "build.nsi" -Value $nsisContent -Encoding UTF8
          Get-Content "build.nsi"
          & "C:\Program Files (x86)\NSIS\makensis.exe" build.nsi

      - name: Verify installer
        shell: pwsh
        run: |
          $installerPath = "${{ env.APP_NAME }}-Windows-Setup.exe"
          if (-not (Test-Path $installerPath)) {
            Write-Error "$installerPath not found!"
            Get-ChildItem -Recurse . | Select-Object FullName
            exit 1
          }

          Write-Host "Installer verified: $installerPath"

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: nanki-windows
          path: ${{ env.APP_NAME }}-Windows-Setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APP_NAME }}-Windows-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pyinstaller-hooks-contrib pywebview pillow

      - name: Generate macOS .icns from PNG assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/icon.iconset

          cp assets/icon-16.png build/icon.iconset/icon_16x16.png
          cp assets/icon-32.png build/icon.iconset/icon_16x16@2x.png
          cp assets/icon-32.png build/icon.iconset/icon_32x32.png
          cp assets/icon-48.png build/icon.iconset/icon_32x32@2x.png
          cp assets/icon-256.png build/icon.iconset/icon_128x128.png
          cp assets/icon-256.png build/icon.iconset/icon_128x128@2x.png
          cp assets/icon-256.png build/icon.iconset/icon_256x256.png
          cp assets/icon-256.png build/icon.iconset/icon_256x256@2x.png
          cp assets/icon-256.png build/icon.iconset/icon_512x512.png
          cp assets/icon-256.png build/icon.iconset/icon_512x512@2x.png

          iconutil -c icns build/icon.iconset -o assets/nanki-icon.icns

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm --clean \
            --name "${{ env.APP_NAME }}" \
            --windowed \
            --noconsole \
            --target-architecture arm64 \
            --icon "assets/nanki-icon.icns" \
            --add-data "src/noteforge_anki_studio/static:noteforge_anki_studio/static" \
            --add-data "src/noteforge_anki_studio/templates:noteforge_anki_studio/templates" \
            --hidden-import noteforge_anki_studio \
            --hidden-import noteforge_anki_studio.ai \
            --hidden-import noteforge_anki_studio.anki_connect \
            --hidden-import noteforge_anki_studio.config \
            --hidden-import noteforge_anki_studio.coverage \
            --hidden-import noteforge_anki_studio.exporters \
            --hidden-import noteforge_anki_studio.importers \
            --hidden-import noteforge_anki_studio.models \
            --hidden-import noteforge_anki_studio.prompts \
            --hidden-import noteforge_anki_studio.storage \
            --hidden-import noteforge_anki_studio.app \
            --hidden-import webview \
            --hidden-import webview.platforms.cocoa \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan.on \
            --collect-all uvicorn \
            --collect-all starlette \
            --collect-all fastapi \
            --collect-all mistune \
            --collect-all markdownify \
            --collect-all httpx \
            --collect-all pydantic \
            --collect-all jinja2 \
            --collect-all PyYAML \
            launcher_webview.py

      - name: Verify build
        shell: bash
        run: |
          if [ ! -d "dist/${{ env.APP_NAME }}.app" ]; then
            echo "${{ env.APP_NAME }}.app not found!"
            exit 1
          fi

      - name: Create branded DMG
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="dist/${{ env.APP_NAME }}.app"
          STAGE_DIR="dmg_temp"
          RW_DMG="${{ env.APP_NAME }}-temp.dmg"
          FINAL_DMG="${{ env.APP_NAME }}-macOS-arm64.dmg"
          VOL_NAME="${{ env.APP_NAME }}"

          rm -rf "$STAGE_DIR" "$RW_DMG" "$FINAL_DMG"
          mkdir -p "$STAGE_DIR"

          cp -R "$APP_PATH" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"

          hdiutil create -srcfolder "$STAGE_DIR" -volname "$VOL_NAME" -fs HFS+ -format UDRW "$RW_DMG"

          DEVICE=$(hdiutil attach -readwrite -noverify -noautoopen "$RW_DMG" | awk '/\/Volumes\// {print $1; exit}')
          MOUNT_POINT="/Volumes/$VOL_NAME"

          cp assets/nanki-icon.icns "$MOUNT_POINT/.VolumeIcon.icns"
          xcrun SetFile -c icnC "$MOUNT_POINT/.VolumeIcon.icns"
          xcrun SetFile -a C "$MOUNT_POINT"

          sync
          hdiutil detach "$DEVICE"

          hdiutil convert "$RW_DMG" -format UDZO -imagekey zlib-level=9 -o "$FINAL_DMG"
          rm -f "$RW_DMG"

      - name: Upload DMG
        uses: actions/upload-artifact@v6
        with:
          name: nanki-macos
          path: ${{ env.APP_NAME }}-macOS-arm64.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APP_NAME }}-macOS-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
