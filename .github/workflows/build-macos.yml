name: Build macOS Apple Silicon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pyinstaller pyinstaller-hooks-contrib pywebview
        
    - name: Build with PyInstaller (macOS arm64)
      run: |
        pyinstaller --name Nanki --windowed --noconsole \
          --target-architecture arm64 \
          --add-data "src/noteforge_anki_studio/static:noteforge_anki_studio/static" \
          --add-data "src/noteforge_anki_studio/templates:noteforge_anki_studio/templates" \
          --hidden-import noteforge_anki_studio \
          --hidden-import noteforge_anki_studio.ai \
          --hidden-import noteforge_anki_studio.anki_connect \
          --hidden-import noteforge_anki_studio.config \
          --hidden-import noteforge_anki_studio.coverage \
          --hidden-import noteforge_anki_studio.exporters \
          --hidden-import noteforge_anki_studio.importers \
          --hidden-import noteforge_anki_studio.models \
          --hidden-import noteforge_anki_studio.prompts \
          --hidden-import noteforge_anki_studio.storage \
          --hidden-import noteforge_anki_studio.app \
          --hidden-import webview \
          --hidden-import webview.platforms.cocoa \
          --hidden-import uvicorn.logging \
          --hidden-import uvicorn.loops.auto \
          --hidden-import uvicorn.protocols.http.auto \
          --hidden-import uvicorn.protocols.websockets.auto \
          --hidden-import uvicorn.lifespan.on \
          --collect-all uvicorn \
          --collect-all starlette \
          --collect-all fastapi \
          --collect-all mistune \
          --collect-all markdownify \
          --collect-all httpx \
          --collect-all pydantic \
          --collect-all jinja2 \
          --collect-all PyYAML \
          launcher_webview.py
          
    - name: Test executable exists
      run: |
        if [ ! -f "dist/Nanki/Nanki" ]; then
          echo "Nanki executable not found!"
          exit 1
        fi
        echo "✓ Nanki built successfully for macOS arm64"
        
    - name: Create DMG
      run: |
        # Create DMG using hdiutil
        mkdir -p dmg_temp
        cp -r dist/Nanki.app dmg_temp/Nanki.app 2>/dev/null || cp -r dist/Nanki dmg_temp/Nanki 2>/dev/null
        
        # Create a simple DMG
        hdiutil create -volname "Nanki" -srcfolder dmg_temp -ov -format UDZO Nanki-macOS-arm64.dmg
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nanki-macos-arm64
        path: Nanki-macOS-arm64.dmg
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: Nanki-macOS-arm64.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}