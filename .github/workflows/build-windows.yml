name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller `
          --name Nanki `
          --windowed `
          --add-data "src/noteforge_anki_studio/static;noteforge_anki_studio/static" `
          --add-data "src/noteforge_anki_studio/templates;noteforge_anki_studio/templates" `
          --hidden-import uvicorn.logging `
          --hidden-import uvicorn.loops.auto `
          --hidden-import uvicorn.protocols.http.auto `
          --hidden-import uvicorn.protocols.websockets.auto `
          --hidden-import uvicorn.lifespan.on `
          --collect-all uvicorn `
          --collect-all starlette `
          --collect-all fastapi `
          --collect-all mistune `
          --collect-all markdownify `
          src/noteforge_anki_studio/__main__.py
          
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: nanki-windows-build
        path: dist/Nanki/
        
    - name: Create simple installer
      run: |
        # Create a simple batch installer instead of NSIS
        @'
        @echo off
        setlocal
        echo ===========================================
        echo           NANKI 0.3 INSTALLER
        echo ===========================================
        echo.
        set "INSTALL_DIR=%ProgramFiles%\Nanki"
        if not exist "%INSTALL_DIR%" mkdir "%INSTALL_DIR%"
        echo Installing to: %INSTALL_DIR%
        xcopy /E /I /Y "%~dp0Nanki" "%INSTALL_DIR%"
        echo.
        echo Creating shortcuts...
        powershell -Command "$WshShell = New-Object -comObject WScript.Shell; $Shortcut = $WshShell.CreateShortcut('$env:USERPROFILE\Desktop\Nanki.lnk'); $Shortcut.TargetPath = '%INSTALL_DIR%\Nanki.exe'; $Shortcut.Save()"
        powershell -Command "$WshShell = New-Object -comObject WScript.Shell; $Shortcut = $WshShell.CreateShortcut('$env:APPDATA\Microsoft\Windows\Start Menu\Programs\Nanki.lnk'); $Shortcut.TargetPath = '%INSTALL_DIR%\Nanki.exe'; $Shortcut.Save()"
        echo.
        echo ===========================================
        echo        Installation complete!
        echo ===========================================
        pause
        start "" "%INSTALL_DIR%\Nanki.exe"
        '@ | Out-File -FilePath "dist\Install-Nanki.bat" -Encoding ASCII
        
        # Create ZIP with everything
        Compress-Archive -Path "dist\Nanki\*" -DestinationPath "dist\Nanki-0.3-Windows.zip" -Force
        
    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: nanki-setup
        path: dist/Nanki-0.3-Windows.zip
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/Nanki-0.3-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
