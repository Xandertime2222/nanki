name: CI — Desktop App

on:
  push:
    branches: [feature/tauri-desktop-rebuild, main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test & Validate ─────────────────────────────────────────────

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm install --install-strategy=shallow
      - run: npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    if: always()
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm install --install-strategy=shallow
      - run: npm run build

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    needs: frontend-test
    if: always()
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm install --install-strategy=shallow
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  backend-test:
    name: Python Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/python-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/python-core/requirements.txt
      - run: pip install -r requirements.txt
      - run: python --version
      - run: ls -la
      - run: ls -la tests/
      - run: python -m pytest tests/ -v --tb=long -s 2>&1 | tee pytest-output.log
      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pytest-output
          path: backend/python-core/pytest-output.log

  # ── Build Backend Executable ────────────────────────────────────

  build-backend-windows:
    name: Build Backend (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend/python-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyinstaller
      - name: Build backend executable
        run: |
          pyinstaller --onefile --name nanki-backend \
            --hidden-import nanki_core \
            --hidden-import nanki_core.app \
            --hidden-import nanki_core.routes.health \
            --hidden-import nanki_core.routes.notes \
            --hidden-import nanki_core.routes.cards \
            --hidden-import nanki_core.routes.settings \
            --hidden-import nanki_core.routes.import_routes \
            --hidden-import nanki_core.routes.anki \
            --hidden-import nanki_core.routes.ai \
            --hidden-import nanki_core.routes.coverage \
            --hidden-import nanki_core.routes.render \
            --collect-all nanki_core \
            --collect-all fastapi \
            --collect-all uvicorn \
            --collect-all starlette \
            --collect-all pydantic \
            --collect-all httpx \
            run.py
      - name: Upload backend executable
        uses: actions/upload-artifact@v4
        with:
          name: nanki-backend-windows
          path: backend/python-core/dist/nanki-backend.exe

  build-backend-macos:
    name: Build Backend (macOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: backend/python-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyinstaller
      - name: Build backend executable
        run: |
          pyinstaller --onefile --name nanki-backend \
            --hidden-import nanki_core \
            --hidden-import nanki_core.app \
            --hidden-import nanki_core.routes.health \
            --hidden-import nanki_core.routes.notes \
            --hidden-import nanki_core.routes.cards \
            --hidden-import nanki_core.routes.settings \
            --hidden-import nanki_core.routes.import_routes \
            --hidden-import nanki_core.routes.anki \
            --hidden-import nanki_core.routes.ai \
            --hidden-import nanki_core.routes.coverage \
            --hidden-import nanki_core.routes.render \
            --collect-all nanki_core \
            --collect-all fastapi \
            --collect-all uvicorn \
            --collect-all starlette \
            --collect-all pydantic \
            --collect-all httpx \
            run.py
      - name: Upload backend executable
        uses: actions/upload-artifact@v4
        with:
          name: nanki-backend-macos
          path: backend/python-core/dist/nanki-backend

  # ── Desktop App Builds ─────────────────────────────────────────

  build-windows:
    name: Build Windows App
    needs: [frontend-test, backend-test, build-backend-windows]
    if: always() && needs.backend-test.result == 'success' && needs.build-backend-windows.result == 'success'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Download backend executable
        uses: actions/download-artifact@v4
        with:
          name: nanki-backend-windows
          path: apps/desktop/src-tauri/binaries
      - name: Rename backend for Tauri
        shell: bash
        working-directory: apps/desktop/src-tauri
        run: |
          mv binaries/nanki-backend.exe binaries/nanki-backend-x86_64-pc-windows-msvc.exe
          ls -la binaries/
      - name: Verify backend executable
        shell: pwsh
        working-directory: apps/desktop/src-tauri
        run: |
          $exe = "binaries/nanki-backend-x86_64-pc-windows-msvc.exe"
          if (Test-Path $exe) {
            Write-Host "Backend executable exists: $((Get-Item $exe).Length) bytes"
            # Check if it's a valid Windows executable (MZ header)
            $bytes = [System.IO.File]::ReadAllBytes($exe)
            if ($bytes[0] -eq 0x4D -and $bytes[1] -eq 0x5A) {
              Write-Host "Valid Windows executable (MZ header found)"
            } else {
              Write-Error "Invalid executable format"
            }
          } else {
            Write-Error "Backend executable not found at $exe"
          }
      - name: Install Rust
        run: |
          Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable --default-host x86_64-pc-windows-msvc
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Install frontend deps
        run: npm install --install-strategy=shallow
      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: nanki-windows-installer
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: nanki-windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  build-macos:
    name: Build macOS App
    needs: [frontend-test, backend-test, build-backend-macos]
    if: always() && needs.backend-test.result == 'success' && needs.build-backend-macos.result == 'success'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Download backend executable
        uses: actions/download-artifact@v4
        with:
          name: nanki-backend-macos
          path: apps/desktop/src-tauri/binaries
      - name: Rename backend for Tauri
        working-directory: apps/desktop/src-tauri
        run: |
          mv binaries/nanki-backend binaries/nanki-backend-aarch64-apple-darwin
          chmod +x binaries/nanki-backend-aarch64-apple-darwin
          ls -la binaries/
      - name: Verify backend executable
        working-directory: apps/desktop/src-tauri
        run: |
          file binaries/nanki-backend-aarch64-apple-darwin
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install frontend deps
        run: npm install --install-strategy=shallow
      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: nanki-macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: nanki-macos-app
          path: apps/desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn