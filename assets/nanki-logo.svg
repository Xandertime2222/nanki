<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C3FF4"/>
      <stop offset="100%" stop-color="#4F8EF7"/>
    </linearGradient>
    <linearGradient id="card1Grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#1a0a4a" flood-opacity="0.35"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#1a0a4a" flood-opacity="0.25"/>
    </filter>
    <clipPath id="roundedSquare">
      <rect width="256" height="256" rx="56"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#bgGrad)" filter="url(#softShadow)"/>

  <!-- Subtle inner highlight at top -->
  <ellipse cx="128" cy="40" rx="90" ry="32" fill="white" fill-opacity="0.08"/>

  <!-- ── FLASHCARDS (stacked behind cat) ── -->

  <!-- Card 3 (back, rotated left) -->
  <g filter="url(#cardShadow)" transform="rotate(-14, 128, 170)">
    <rect x="68" y="138" width="84" height="62" rx="10" fill="white" fill-opacity="0.18"/>
    <rect x="68" y="138" width="84" height="62" rx="10" stroke="white" stroke-opacity="0.25" stroke-width="1.2"/>
  </g>

  <!-- Card 2 (middle, slight right tilt) -->
  <g filter="url(#cardShadow)" transform="rotate(8, 128, 170)">
    <rect x="68" y="138" width="84" height="62" rx="10" fill="white" fill-opacity="0.28"/>
    <rect x="68" y="138" width="84" height="62" rx="10" stroke="white" stroke-opacity="0.35" stroke-width="1.2"/>
    <!-- lines on card -->
    <line x1="82" y1="158" x2="138" y2="158" stroke="white" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>
    <line x1="82" y1="170" x2="128" y2="170" stroke="white" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Card 1 (front, upright) -->
  <g filter="url(#cardShadow)">
    <rect x="104" y="148" width="84" height="62" rx="10" fill="white" fill-opacity="0.92"/>
    <rect x="104" y="148" width="84" height="62" rx="10" stroke="white" stroke-opacity="0.6" stroke-width="1.2"/>
    <!-- lines on front card -->
    <line x1="118" y1="168" x2="174" y2="168" stroke="#6C3FF4" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>
    <line x1="118" y1="180" x2="164" y2="180" stroke="#6C3FF4" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>
    <line x1="118" y1="192" x2="156" y2="192" stroke="#6C3FF4" stroke-opacity="0.25" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ── CAT (simple, cute, white) ── -->

  <!-- Cat body -->
  <ellipse cx="108" cy="150" rx="38" ry="32" fill="white" fill-opacity="0.95"/>

  <!-- Cat head -->
  <circle cx="108" cy="108" r="36" fill="white" fill-opacity="0.95"/>

  <!-- Left ear (triangle) -->
  <polygon points="80,86 72,58 96,78" fill="white" fill-opacity="0.95"/>
  <!-- Left ear inner -->
  <polygon points="80,84 75,64 92,78" fill="#C4AAFF" fill-opacity="0.7"/>

  <!-- Right ear -->
  <polygon points="136,86 144,58 120,78" fill="white" fill-opacity="0.95"/>
  <!-- Right ear inner -->
  <polygon points="136,84 141,64 124,78" fill="#C4AAFF" fill-opacity="0.7"/>

  <!-- Cat face -->
  <!-- Eyes -->
  <ellipse cx="97" cy="108" rx="6" ry="7" fill="#3d2080"/>
  <ellipse cx="119" cy="108" rx="6" ry="7" fill="#3d2080"/>
  <!-- Eye shine -->
  <circle cx="99" cy="106" r="2" fill="white"/>
  <circle cx="121" cy="106" r="2" fill="white"/>

  <!-- Nose -->
  <polygon points="108,118 104,122 112,122" fill="#F9A8D4"/>
  <!-- Mouth -->
  <path d="M104 122 Q108 128 112 122" stroke="#3d2080" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="76" y1="118" x2="100" y2="120" stroke="#6C3FF4" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="76" y1="124" x2="100" y2="124" stroke="#6C3FF4" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers right -->
  <line x1="140" y1="118" x2="116" y2="120" stroke="#6C3FF4" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="140" y1="124" x2="116" y2="124" stroke="#6C3FF4" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cat tail (peeking from right of body) -->
  <path d="M144 158 Q168 140 162 120 Q158 108 168 102" stroke="white" stroke-opacity="0.9" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Paws -->
  <ellipse cx="90" cy="178" rx="14" ry="8" fill="white" fill-opacity="0.9"/>
  <ellipse cx="126" cy="178" rx="14" ry="8" fill="white" fill-opacity="0.9"/>
</svg>
