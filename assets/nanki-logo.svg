<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  
  <!-- Card stack -->
  <rect x="180" y="160" width="200" height="260" rx="20" fill="#ffffff" opacity="0.9"/>
  <rect x="160" y="140" width="200" height="260" rx="20" fill="#ffffff" opacity="0.7"/>
  <rect x="140" y="120" width="200" height="260" rx="20" fill="#ffffff" opacity="0.5"/>
  
  <!-- Front card with lines -->
  <rect x="180" y="160" width="200" height="260" rx="20" fill="#ffffff" stroke="#6366f1" stroke-width="3"/>
  <line x1="210" y1="210" x2="350" y2="210" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <line x1="210" y1="250" x2="330" y2="250" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <line x1="210" y1="290" x2="340" y2="290" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <line x1="210" y1="330" x2="320" y2="330" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Check mark -->
  <path d="M 280 360 L 300 380 L 340 340" stroke="#6366f1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
