repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - fastapi>=0.110
          - pydantic>=2.6
          - PyYAML>=6.0
          - httpx>=0.27
          - mistune>=3.0
          - PyMuPDF>=1.24
          - markdownify>=0.13
          - pywebview>=5.0
          - types-PyYAML
          - types-markdown
